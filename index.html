<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;


/* ============================================================
   HAMPTONS MARATHON · PLAN v5
   Recalibrated from 242 logged runs (through 2026-05-22).
   - Wed + Sun rest days · quality Tue · long Sat · easy+strength Fri
   - 3-tier pace system (Realistic / Goal / Stretch)
   - Volume capped to demonstrated ceiling (~41mi peak, 18mi long)
   - Race day (Sat Sep 26) aligns with Saturday long runs
   - Live run tracking persisted via localStorage
   ============================================================ */

const storage = {
  get: (key) => { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } },
  set: (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); } catch {} },
};

const PACE_TIERS = {
  realistic: { name:"Realistic", mp:"11:35", finish:"5:04", hrMP:"158–165", long:"12:35–13:20", note:"Riegel projection from your Brooklyn Half (11:11/mi @ HR168). The honest starting point." },
  goal:      { name:"Goal",      mp:"11:15", finish:"4:55", hrMP:"160–167", long:"12:15–13:00", note:"A fit, well-fueled day. Train marathon-pace runs here once W8 confirms the trend." },
  stretch:   { name:"Stretch",   mp:"10:50", finish:"4:44", hrMP:"163–170", long:"11:50–12:35", note:"Your stated reach goal. Faster than your current half pace — earn it in the build, don't assume it on race day." },
};

const SPEED_PACES = { "400m":"9:15–9:30", "800m":"9:30–9:45", "1mi":"9:45–10:00" };
const EASY_BAND = "11:30–12:15/mi · HR 140–155";

const FITNESS = [
  { k:"Brooklyn Half",     v:"11:11/mi",  s:"May 16 · HR 168 avg · your key benchmark" },
  { k:"Easy avg (90d)",    v:"11:45/mi",  s:"HR 149 · but swings 10:18→12:47 — tighten it" },
  { k:"Longest clean run", v:"15 mi",     s:"Aug 2025 · the Apr 16mi was a tendon walk-run" },
  { k:"Recent peak week",  v:"~40 mi",    s:"Plan caps at ~41 to respect this" },
  { k:"LT / Max HR",       v:"177 / 202", s:"Easy ceiling corrected to ~162" },
];

const strengthExercises = {
  A: {
    label:"Foundation + Tendon", focus:"Glutes, ankle mobility, extensor-tendon protection",
    core:[
      { name:"Single-leg Glute Bridge",       sets:"2→3×12 each", cue:"Drive heel into floor. Squeeze glute at top. Don't let the hip drop." },
      { name:"Kneeling Dorsiflexion Stretch", sets:"3×30s each",  cue:"Knee over toe, lean forward. Direct tendon mobility." },
      { name:"Single-leg Calf Raise",         sets:"2→3×15 each", cue:"3s down, 1s up. Full range. Edge of a step when ready." },
      { name:"Eccentric Tibialis Raise", tendon:true, sets:"3×15", cue:"Heels on edge, 2s lower. THE non-negotiable for your tendon history." },
    ],
    optional:[
      { name:"Clamshells (band)", sets:"2×15 each", cue:"Hips stacked. Controls hip drop in late-race miles." },
      { name:"Dead Bug",          sets:"2×8 each",  cue:"Low back flat. Core stability for upright form." },
    ],
  },
  B: {
    label:"Power & Stability", focus:"Single-leg strength, running posture, late-race form",
    core:[
      { name:"Bulgarian Split Squat",        sets:"2→3×10 each", cue:"Rear foot elevated. Front knee tracks the toe. Build to load." },
      { name:"Single-leg Romanian Deadlift", sets:"2→3×10 each", cue:"Hinge at hip, soft knee. Hips level — fights lateral drop." },
      { name:"Pallof Press",                 sets:"2→3×10 each", cue:"Anti-rotation. Resist the pull. Steady breathing." },
      { name:"Eccentric Tibialis Raise", tendon:true, sets:"3×15", cue:"Every routine, every week. Tendon health is non-negotiable." },
    ],
    optional:[
      { name:"Step-up + Knee Drive", sets:"2×12 each", cue:"Drive knee high. Builds glute power for hills." },
      { name:"Copenhagen Plank",     sets:"2×20s each",cue:"Side plank, top leg on a bench. Adductor strength." },
    ],
  },
  C: {
    label:"Endurance & Resilience", focus:"Fatigue resistance, marathon-specific durability",
    core:[
      { name:"Walking Lunge",     sets:"2→3×20 steps", cue:"Add light dumbbells when ready. Mimics late-race fatigue." },
      { name:"Banded Hip Thrust", sets:"2→3×15",       cue:"Full hip extension at top. Band adds glute-med challenge." },
      { name:"Plank to Down Dog", sets:"2→3×10",       cue:"Dynamic core + hip flexor. Keep breathing throughout." },
      { name:"Eccentric Tibialis Raise", tendon:true, sets:"3×15", cue:"Every week. Non-negotiable given your tendon history." },
    ],
    optional:[
      { name:"Single-leg Wall Sit",      sets:"2×30s each", cue:"Isometric quad. Simulates downhill braking." },
      { name:"Side-lying Hip Abduction", sets:"2×20 each",  cue:"Slow, controlled. Prevents IT-band issues at peak mileage." },
    ],
  },
};

const tuesdayMini = [
  { name:"Single-leg Glute Bridge", sets:"2×20 → 2×15 (W10+)", cue:"Higher reps than the Friday routine. Endurance focus." },
  { name:"Single-leg Calf Raise",   sets:"2×20 → 2×15 (W10+)", cue:"Slow eccentric. Protect the tendon through peak mileage." },
  { name:"Eccentric Tibialis Raise",tendon:true, sets:"2×15",  cue:"Always. Even in taper." },
];

/* ---------- WEEKS · Mon easy · Tue quality · Wed REST · Thu easy · Fri easy+strength · Sat long · Sun REST ---------- */
const W = (week,startDate,phase,flags,days,longRunNote) => ({week,startDate,phase,...flags,days,longRunNote});

const weeks = [
  W(1,"Jun 8","Base",{},{mon:{t:"easy",l:"4mi Easy + 4 Strides",mi:4,n:"4×20s strides after. "+EASY_BAND},tue:{t:"pace",l:"5mi w/ Marathon Pace",mi:5,n:"First MP touch. Hold {MP}/mi for the middle 3."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"3mi Easy + 4 Strides",mi:3,n:"4×20s strides."},fri:{t:"strength",l:"3mi Easy + Strength A",mi:3,r:"A",n:"Easy shakeout, then strength. Keep it light before tomorrow's long run."},sat:{t:"long",l:"8mi Long",mi:8},sun:{t:"rest",l:"Rest",mi:0}},"Conversational. Resist going fast — this is the base."),
  W(2,"Jun 15","Base",{},{mon:{t:"easy",l:"4mi Easy + 4 Strides",mi:4,n:"4×20s strides."},tue:{t:"easy",l:"5mi Easy",mi:5,n:"Pure easy. "+EASY_BAND},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"4mi Easy + 4 Strides",mi:4,n:"4×20s strides."},fri:{t:"strength",l:"3mi Easy + Strength B",mi:3,r:"B",n:"Easy + strength. Light before the long run."},sat:{t:"long",l:"9mi Long",mi:9},sun:{t:"rest",l:"Rest",mi:0}},"Stay easy. Time on feet is the goal."),
  W(3,"Jun 22","Base",{cutback:true,speed:true},{mon:{t:"easy",l:"4mi Easy + 4 Strides",mi:4,n:"4×20s strides."},tue:{t:"speed",l:"5mi w/ 6×400m",mi:5,n:"1mi WU + 6×400m @ "+SPEED_PACES["400m"]+" + 1mi CD."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"4mi Easy",mi:4,n:"Easy recovery after speed."},fri:{t:"strength",l:"3mi Easy + Strength C",mi:3,r:"C",n:"Easy + strength."},sat:{t:"long",l:"6mi Long",mi:6},sun:{t:"rest",l:"Rest",mi:0}},"Cutback. Body absorbing W1–2. Don't add miles."),
  W(4,"Jun 29","Base",{},{mon:{t:"easy",l:"4mi Easy + 4 Strides",mi:4,n:"4×20s strides."},tue:{t:"pace",l:"6mi w/ Marathon Pace",mi:6,n:"Hold {MP}/mi for the final 3."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"4mi Easy + 4 Strides",mi:4,n:"4×20s strides."},fri:{t:"strength",l:"3mi Easy + Strength A",mi:3,r:"A",n:"Easy + strength."},sat:{t:"long",l:"11mi Long",mi:11},sun:{t:"rest",l:"Rest",mi:0}},"First double-digit. Miles 1–8 easy, last 3 at {MP}/mi."),
  W(5,"Jul 6","Build",{speed:true,mini:true},{mon:{t:"easy",l:"5mi Easy + 6 Strides + Mini",mi:5,n:"6×20s strides + 10min mini."},tue:{t:"speed",l:"5mi w/ 8×400m",mi:5,n:"1mi WU + 8×400m @ "+SPEED_PACES["400m"]+" + 1mi CD."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"5mi Easy + 6 Strides",mi:5,n:"6×20s strides."},fri:{t:"strength",l:"3mi Easy + Strength B",mi:3,r:"B",n:"Easy + strength."},sat:{t:"long",l:"12mi Long",mi:12},sun:{t:"rest",l:"Rest",mi:0}},"You've run 12 before. Start practicing fueling — gel at the turn."),
  W(6,"Jul 13","Build",{cutback:true,mini:true},{mon:{t:"easy",l:"4mi Easy + 6 Strides + Mini",mi:4,n:"6×20s strides + mini."},tue:{t:"pace",l:"6mi w/ Marathon Pace",mi:6,n:"Should feel easier than W4. Hold {MP}/mi."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"4mi Easy + 6 Strides",mi:4,n:"6×20s strides."},fri:{t:"strength",l:"3mi Easy + Strength C",mi:3,r:"C",n:"Easy + strength."},sat:{t:"long",l:"9mi Long",mi:9},sun:{t:"rest",l:"Rest",mi:0}},"Stepback. HR under 150. Legs should feel fresher."),
  W(7,"Jul 20","Build",{speed:true,mini:true},{mon:{t:"easy",l:"5mi Easy + 6 Strides + Mini",mi:5,n:"6×20s strides + mini."},tue:{t:"speed",l:"6mi w/ 4×800m",mi:6,n:"1mi WU + 4×800m @ "+SPEED_PACES["800m"]+" + 1mi CD."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"5mi Easy + 6 Strides",mi:5,n:"6×20s strides."},fri:{t:"strength",l:"4mi Easy + Strength A",mi:4,r:"A",n:"Easy + strength."},sat:{t:"long",l:"14mi Long",mi:14},sun:{t:"rest",l:"Rest",mi:0}},"First serious long run. Gel every 45min. Rehearse race nutrition."),
  W(8,"Jul 27","Build",{mini:true,review:true},{mon:{t:"easy",l:"5mi Easy + 6 Strides + Mini",mi:5,n:"6×20s strides + mini."},tue:{t:"pace",l:"7mi w/ Marathon Pace",mi:7,n:"Longest MP run yet. Hold {MP}/mi."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"5mi Easy + 6 Strides",mi:5,n:"6×20s strides."},fri:{t:"strength",l:"4mi Easy + Strength B",mi:4,r:"B",n:"Easy + strength."},sat:{t:"long",l:"15mi Long",mi:15},sun:{t:"rest",l:"Rest",mi:0}},"15 = matches your clean PR distance. Last 3 at {MP}/mi. PACE REVIEW after this week."),
  W(9,"Aug 3","Build",{cutback:true,speed:true,mini:true},{mon:{t:"easy",l:"5mi Easy + 6 Strides + Mini",mi:5,n:"6×20s strides + mini."},tue:{t:"speed",l:"6mi w/ 5×800m",mi:6,n:"1mi WU + 5×800m @ "+SPEED_PACES["800m"]+" + 1mi CD."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"5mi Easy + 6 Strides",mi:5,n:"6×20s strides."},fri:{t:"strength",l:"3mi Easy + Strength C",mi:3,r:"C",n:"Easy + strength."},sat:{t:"long",l:"10mi Long",mi:10},sun:{t:"rest",l:"Rest",mi:0}},"Cutback. Don't inflate it — your legs need this after W8."),
  W(10,"Aug 10","Peak",{mini:true},{mon:{t:"easy",l:"5mi Easy + 6 Strides + Mini",mi:5,n:"6×20s strides + mini."},tue:{t:"pace",l:"8mi w/ Marathon Pace",mi:8,n:"Longest mid-week run. Hold {MP}/mi."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"5mi Easy + 6 Strides",mi:5,n:"6×20s strides."},fri:{t:"strength",l:"4mi Easy + Strength A · 2 sets",mi:4,r:"A",n:"Easy + strength."},sat:{t:"long",l:"16mi Long",mi:16},sun:{t:"rest",l:"Rest",mi:0}},"Arrive rested. Gel every 40min. This is your first clean 16."),
  W(11,"Aug 17","Peak",{speed:true,mini:true},{mon:{t:"easy",l:"7mi Easy + 4 Strides + Mini",mi:7,n:"4 strides (peak) + mini."},tue:{t:"speed",l:"6mi w/ 3×1mi",mi:6,n:"1mi WU + 3×1mi @ "+SPEED_PACES["1mi"]+" + 1mi CD."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"6mi Easy + 4 Strides",mi:6,n:"4×20s strides."},fri:{t:"strength",l:"4mi Easy + Strength B · 2 sets",mi:4,r:"B",n:"Easy + strength. Keep it light before the 18."},sat:{t:"long",l:"18mi Long",mi:18},sun:{t:"rest",l:"Rest",mi:0}},"Longest run of the plan. Mi 1–12 easy, 13–16 at {MP}/mi, last 2 easy. Nail nutrition."),
  W(12,"Aug 24","Peak",{cutback:true,mini:true},{mon:{t:"easy",l:"5mi Easy + 4 Strides + Mini",mi:5,n:"4 strides + mini."},tue:{t:"pace",l:"7mi w/ Marathon Pace",mi:7,n:"More controlled than W10. Hold {MP}/mi."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"5mi Easy + 4 Strides",mi:5,n:"4×20s strides."},fri:{t:"strength",l:"3mi Easy + Strength C · 2 sets",mi:3,r:"C",n:"Easy + strength."},sat:{t:"long",l:"13mi Long",mi:13},sun:{t:"rest",l:"Rest",mi:0}},"Stepback — feels too easy. Good. Consolidating peak work."),
  W(13,"Aug 31","Peak",{speed:true,mini:true},{mon:{t:"easy",l:"6mi Easy + 4 Strides + Mini",mi:6,n:"4 strides + mini."},tue:{t:"speed",l:"6mi w/ 4×1mi",mi:6,n:"1mi WU + 4×1mi @ "+SPEED_PACES["1mi"]+" + 1mi CD."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"6mi Easy + 4 Strides",mi:6,n:"4×20s strides."},fri:{t:"strength",l:"4mi Easy + Strength A · 2 sets",mi:4,r:"A",n:"Easy + strength."},sat:{t:"long",l:"17mi Long",mi:17},sun:{t:"rest",l:"Rest",mi:0}},"Last big one. Easy the whole way, gel every 40min. Confidence builder."),
  W(14,"Sep 7","Taper",{bronx10:true,mini:true},{mon:{t:"easy",l:"5mi Easy + 4 Strides + Mini",mi:5,n:"Last mini of the plan."},tue:{t:"pace",l:"5mi w/ Marathon Pace",mi:5,n:"Shortened — race weekend ahead. {MP}/mi."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"3mi Easy",mi:3,n:"Very easy shakeout."},fri:{t:"rest",l:"Rest + Race Prep",mi:0},sat:{t:"easy",l:"2mi Shakeout",mi:2,n:"Optional easy 2mi + a few strides. Loosen up for tomorrow's race."},sun:{t:"race",l:"Bronx 10 Miler (Sep 13)",mi:10,n:"Start {MP}/mi, cap HR 164. Dress rehearsal — logistics, fueling, pacing. NOT a PR attempt."}},"Bronx 10 (Sun) replaces the long run. Controlled effort, not racing."),
  W(15,"Sep 14","Taper",{speed:true},{mon:{t:"easy",l:"3mi Easy Recovery",mi:3,n:"Post-Bronx. Very easy, walk if needed."},tue:{t:"speed",l:"5mi w/ 3×1mi",mi:5,n:"1mi WU + 3×1mi @ "+SPEED_PACES["1mi"]+" + 1mi CD. Last speed session."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"3mi Very Easy",mi:3,n:"Shakeout. HR under 145."},fri:{t:"strength",l:"3mi Easy + Strength A · 2 sets",mi:3,r:"A",n:"Light easy + strength."},sat:{t:"long",l:"10mi Long",mi:10},sun:{t:"rest",l:"Rest",mi:0}},"First taper week. Legs may feel flat — normal. Trust it."),
  W(16,"Sep 21","Taper",{raceweek:true},{mon:{t:"easy",l:"3mi Easy + 4 Strides",mi:3,n:"Last strides. Light."},tue:{t:"pace",l:"2mi + 4 Race Strides",mi:2,n:"2mi easy + 4×20s at goal pace. Stay calm."},wed:{t:"rest",l:"Rest",mi:0},thu:{t:"easy",l:"2mi Very Easy",mi:2,n:"Shakeout. Legs, not lungs."},fri:{t:"rest",l:"Rest + Packet Pickup",mi:0},sat:{t:"race",l:"RACE DAY — Hamptons (Sep 26)",mi:26.2,n:"Marathon day! Start {MP}/mi, cap HR on hills. Miles 1–8 disciplined. Trust 16 weeks."},sun:{t:"rest",l:"Rest · Celebrate",mi:0}},"Race week. Everything easy. Trust every mile since June 8."),
];

weeks.forEach(w => {
  w.totalMiles = Math.round(Object.values(w.days).reduce((s,d)=>s+d.mi,0)*10)/10;
  w.longRun = Math.max(0, ...Object.values(w.days).filter(d=>d.t==="long"||d.t==="race").map(d=>d.mi));
});

const PHASE_COLOR = { Base:"#5ec5d6", Build:"#6bd49a", Peak:"#e8a13c", Taper:"#a98cf0" };
const TYPE_COLOR  = { rest:"#3a4150", easy:"#5ec5d6", pace:"#e8a13c", speed:"#ff6b5e", long:"#a98cf0", strength:"#6bd49a", race:"#ff6b5e" };
const TYPE_LABEL  = { rest:"Rest", easy:"Easy", pace:"Pace", speed:"Speed", long:"Long", strength:"Strength", race:"Race" };
const DAYS     = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
const DAY_KEYS = ["mon","tue","wed","thu","fri","sat","sun"];

const ACCENT="#c8f135", BG="#0a0b0d", SURFACE="#14161a", LINE="#23262d", MUTED="#7d8590", DIM="#4a505c", TXT="#eceef1";

/* fonts + keyframes are in <head> */

const fDisp = "'Bricolage Grotesque', sans-serif";
const fBody = "'Hanken Grotesk', sans-serif";
const fMono = "'JetBrains Mono', monospace";

function Ring({ p, size = 30, sw = 3, color = ACCENT }) {
  const r = (size - sw) / 2, c = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={LINE} strokeWidth={sw} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
        strokeDasharray={c} strokeDashoffset={c*(1-p)} strokeLinecap="round" style={{ transition: "stroke-dashoffset .4s" }} />
    </svg>
  );
}

function TierPill({ id, tier, chooseTier }) {
  const t = PACE_TIERS[id], active = tier === id;
  return (
    <button onClick={() => chooseTier(id)} style={{ flex:1, padding:"9px 6px", borderRadius:9, cursor:"pointer", fontFamily:fBody, background:active?ACCENT:"transparent", border:`1px solid ${active?ACCENT:LINE}`, color:active?BG:MUTED, transition:".15s" }}>
      <div style={{ fontSize:12, fontWeight:700 }}>{t.name}</div>
      <div style={{ fontFamily:fMono, fontSize:11, marginTop:2, color:active?BG:TXT }}>{t.mp}</div>
    </button>
  );
}

function App() {
  const [tier, setTier]                   = useState("goal");
  const [selWeek, setSelWeek]             = useState(0);
  const [view, setView]                   = useState("dashboard");
  const [done, setDone]                   = useState({});
  const [strengthModal, setStrengthModal] = useState(null);
  const [strengthTab, setStrengthTab]     = useState("core");
  const [miniModal, setMiniModal]         = useState(false);

  useEffect(() => {
    const d = storage.get("ham_done"), t = storage.get("ham_tier");
    if (d) setDone(d);
    if (t) setTier(t);
  }, []);

  const chooseTier = (t) => { setTier(t); storage.set("ham_tier", t); };
  const toggleDay = (wk, dk) => {
    const key = `W${wk}-${dk}`, next = { ...done };
    next[key] ? delete next[key] : (next[key] = 1);
    setDone(next); storage.set("ham_done", next);
  };
  const resetAll = () => { if (window.confirm("Clear all logged runs?")) { setDone({}); storage.set("ham_done", {}); } };
  const inject = (s) => (s || "").replace(/\{MP\}/g, PACE_TIERS[tier].mp);

  const runDayKeys   = (w) => DAY_KEYS.filter(k => w.days[k].t !== "rest");
  const totalRunDays = weeks.reduce((s, w) => s + runDayKeys(w).length, 0);
  const doneCount    = Object.keys(done).length;
  const plannedMiles = weeks.reduce((s, w) => s + w.totalMiles, 0);
  const loggedMiles  = weeks.reduce((s, w) => s + DAY_KEYS.reduce((a, k) => a + (done[`W${w.week}-${k}`] ? w.days[k].mi : 0), 0), 0);
  const weekDone     = (w) => { const rk = runDayKeys(w); return rk.length ? rk.filter(k => done[`W${w.week}-${k}`]).length / rk.length : 0; };
  const isRaceWk     = (w) => w.bronx10 || w.raceweek;
  const maxMi        = Math.max(...weeks.map(w => w.totalMiles));
  const T = PACE_TIERS[tier], w = weeks[selWeek];

  return (
    <div style={{ background: BG, minHeight: "100vh", color: TXT, fontFamily: fBody }}>

      {/* HEADER */}
      <div style={{ borderBottom: `1px solid ${LINE}`, background: `radial-gradient(120% 100% at 0% 0%, #16181d 0%, ${BG} 60%)` }}>
        <div style={{ maxWidth: 880, margin: "0 auto", padding: "26px 18px 22px" }}>
          <div style={{ fontFamily: fMono, fontSize: 10, letterSpacing: 2, color: ACCENT, marginBottom: 8 }}>HIGDON N2 HYBRID · v5 · SUN + WED REST</div>
          <h1 style={{ margin: 0, fontFamily: fDisp, fontSize: 38, fontWeight: 800, lineHeight: 1, letterSpacing: -1 }}>Hamptons Marathon</h1>
          <div style={{ fontSize: 13, color: MUTED, marginTop: 8 }}>Jun 8 → Sep 26, 2026 · 16 weeks · {plannedMiles.toFixed(0)} planned miles</div>

          <div style={{ marginTop: 18, background: SURFACE, border: `1px solid ${LINE}`, borderRadius: 14, padding: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
              <span style={{ fontFamily: fMono, fontSize: 10, letterSpacing: 1.5, color: MUTED }}>GOAL PACE TIER</span>
              <span style={{ fontSize: 12, color: MUTED }}>Predicted finish <b style={{ color: TXT, fontFamily: fMono }}>{T.finish}</b></span>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              {["realistic","goal","stretch"].map(id => <TierPill key={id} id={id} tier={tier} chooseTier={chooseTier} />)}
            </div>
            <div style={{ fontSize: 12, color: MUTED, lineHeight: 1.6, marginTop: 10 }}>{T.note}</div>
            <div style={{ display: "flex", gap: 18, marginTop: 12, flexWrap: "wrap", fontSize: 12 }}>
              {[["Marathon pace",`${T.mp}/mi`],["MP heart rate",T.hrMP],["Long-run pace",`${T.long}/mi`],["Easy","11:30–12:15"]].map(([k,v]) => (
                <div key={k}><div style={{ color: DIM, fontSize: 10, textTransform: "uppercase", letterSpacing: 1 }}>{k}</div><div style={{ fontFamily: fMono, color: TXT, marginTop: 2 }}>{v}</div></div>
              ))}
            </div>
          </div>

          <div style={{ marginTop: 12, background: "#1c1210", border: `1px solid #ff6b5e30`, borderRadius: 12, padding: "11px 14px", fontSize: 12, color: MUTED, lineHeight: 1.6 }}>
            <b style={{ color: "#ff6b5e" }}>Tendon protocol — </b>eccentric tibialis raises every strength session, even in taper. Get physio sign-off before Week 1.
          </div>
        </div>
      </div>

      {/* TABS */}
      <div style={{ borderBottom: `1px solid ${LINE}`, background: BG, position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ maxWidth: 880, margin: "0 auto", display: "flex", overflowX: "auto" }}>
          {[["dashboard","Overview"],["plan","Plan"],["strength","Strength"],["notes","Notes"]].map(([id, l]) => (
            <button key={id} onClick={() => setView(id)} style={{ background: "none", border: "none", cursor: "pointer", padding: "13px 18px", fontFamily: fBody, fontSize: 13, fontWeight: view===id?700:500, whiteSpace: "nowrap", color: view===id?ACCENT:MUTED, borderBottom: `2px solid ${view===id?ACCENT:"transparent"}` }}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: 880, margin: "0 auto", padding: "22px 18px 48px" }}>

        {/* DASHBOARD */}
        {view === "dashboard" && (
          <div className="rise" style={{ display: "flex", flexDirection: "column", gap: 18 }}>
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <div style={{ flex: "1 1 150px", background: SURFACE, border: `1px solid ${LINE}`, borderRadius: 14, padding: 16, display: "flex", alignItems: "center", gap: 14 }}>
                <Ring p={doneCount/totalRunDays} size={48} sw={5} />
                <div>
                  <div style={{ fontFamily: fDisp, fontSize: 26, fontWeight: 800, lineHeight: 1 }}>{Math.round((doneCount/totalRunDays)*100)}%</div>
                  <div style={{ fontSize: 11, color: MUTED }}>{doneCount}/{totalRunDays} runs done</div>
                </div>
              </div>
              <div style={{ flex: "1 1 150px", background: SURFACE, border: `1px solid ${LINE}`, borderRadius: 14, padding: 16 }}>
                <div style={{ fontFamily: fDisp, fontSize: 26, fontWeight: 800, lineHeight: 1, color: ACCENT }}>{loggedMiles.toFixed(0)}</div>
                <div style={{ fontSize: 11, color: MUTED, marginTop: 2 }}>of {plannedMiles.toFixed(0)} miles logged</div>
                <div style={{ height: 5, background: LINE, borderRadius: 3, marginTop: 8, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${(loggedMiles/plannedMiles)*100}%`, background: ACCENT, transition: ".4s" }} />
                </div>
              </div>
            </div>

            <div style={{ background: SURFACE, border: `1px solid ${LINE}`, borderRadius: 14, padding: "16px 16px 12px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 14 }}>
                <span style={{ fontFamily: fMono, fontSize: 10, letterSpacing: 1.5, color: MUTED }}>WEEKLY VOLUME · PEAK {maxMi.toFixed(0)}mi</span>
                <span style={{ fontSize: 11, color: DIM }}>tap to jump to week</span>
              </div>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 110 }}>
                {weeks.map((wk, i) => {
                  const h = (wk.totalMiles/maxMi)*100, wd = weekDone(wk);
                  return (
                    <button key={i} onClick={() => { setSelWeek(i); setView("plan"); }} title={`W${wk.week} · ${wk.totalMiles}mi`} style={{ flex: 1, height: "100%", display: "flex", flexDirection: "column", justifyContent: "flex-end", background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                      <div style={{ height: `${h}%`, borderRadius: "3px 3px 0 0", background: isRaceWk(wk) ? "#ff6b5e" : PHASE_COLOR[wk.phase], opacity: wd>=1?1:0.42, outline: selWeek===i?`2px solid ${ACCENT}`:"none", transition: ".2s" }} />
                    </button>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 3, marginTop: 5 }}>
                {weeks.map((wk, i) => <div key={i} style={{ flex: 1, textAlign: "center", fontFamily: fMono, fontSize: 8, color: selWeek===i?ACCENT:DIM }}>{wk.week}</div>)}
              </div>
              <div style={{ display: "flex", gap: 14, marginTop: 12, flexWrap: "wrap" }}>
                {Object.entries(PHASE_COLOR).map(([p, c]) => (
                  <span key={p} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: MUTED }}><span style={{ width: 9, height: 9, borderRadius: 2, background: c }} />{p}</span>
                ))}
                <span style={{ fontSize: 11, color: MUTED }}>· filled = completed</span>
              </div>
            </div>

            <div style={{ background: SURFACE, border: `1px solid ${LINE}`, borderRadius: 14, padding: 16 }}>
              <div style={{ fontFamily: fMono, fontSize: 10, letterSpacing: 1.5, color: MUTED, marginBottom: 12 }}>FITNESS SNAPSHOT · FROM YOUR DATA</div>
              {FITNESS.map((f, i) => (
                <div key={i} style={{ display: "flex", gap: 12, alignItems: "baseline", borderBottom: i<FITNESS.length-1?`1px solid ${LINE}`:"none", paddingBottom: i<FITNESS.length-1?10:0, marginBottom: i<FITNESS.length-1?10:0 }}>
                  <div style={{ width: 130, fontSize: 12, color: MUTED, flexShrink: 0 }}>{f.k}</div>
                  <div style={{ fontFamily: fMono, fontSize: 14, fontWeight: 700, color: ACCENT, width: 78, flexShrink: 0 }}>{f.v}</div>
                  <div style={{ fontSize: 11, color: DIM, lineHeight: 1.4 }}>{f.s}</div>
                </div>
              ))}
            </div>

            <button onClick={resetAll} style={{ alignSelf: "flex-start", background: "none", border: `1px solid ${LINE}`, color: DIM, borderRadius: 8, padding: "7px 14px", fontFamily: fBody, fontSize: 12, cursor: "pointer" }}>Reset logged runs</button>
          </div>
        )}

        {/* PLAN */}
        {view === "plan" && (
          <div className="rise">
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 18 }}>
              {weeks.map((wk, i) => {
                const sel = selWeek === i, wd = weekDone(wk);
                return (
                  <button key={i} onClick={() => setSelWeek(i)} style={{ width: 42, height: 42, borderRadius: 9, cursor: "pointer", fontFamily: fMono, fontWeight: 700, fontSize: 13, position: "relative", background: sel?PHASE_COLOR[wk.phase]:SURFACE, color: sel?BG:PHASE_COLOR[wk.phase], border: `1px solid ${sel?PHASE_COLOR[wk.phase]:wd>=1?ACCENT:LINE}` }}>
                    {wk.week}
                    {wd>=1&&!sel&&<span style={{ position: "absolute", top: -3, right: -3, width: 12, height: 12, borderRadius: "50%", background: ACCENT, color: BG, fontSize: 8, display: "flex", alignItems: "center", justifyContent: "center" }}>✓</span>}
                    {wk.speed&&!sel&&wd<1&&<span style={{ position: "absolute", bottom: 3, right: 4, width: 4, height: 4, borderRadius: "50%", background: "#ff6b5e" }} />}
                  </button>
                );
              })}
            </div>

            <div style={{ background: SURFACE, border: `1px solid ${LINE}`, borderTop: `3px solid ${isRaceWk(w) ? "#ff6b5e" : PHASE_COLOR[w.phase]}`, borderRadius: 14, padding: "16px 18px", marginBottom: 14, display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 14 }}>
              <div>
                <div style={{ fontFamily: fMono, fontSize: 10, letterSpacing: 1.5, color: isRaceWk(w) ? "#ff6b5e" : PHASE_COLOR[w.phase] }}>
                  WEEK {w.week} · {w.phase.toUpperCase()}{w.cutback?" · CUTBACK":""}{isRaceWk(w)?" · RACE WEEK":""}{w.review?" · PACE REVIEW":""}
                </div>
                <div style={{ fontFamily: fDisp, fontSize: 26, fontWeight: 800, marginTop: 2 }}>{w.startDate}</div>
              </div>
              <div style={{ display: "flex", gap: 18, alignItems: "center" }}>
                <div><div style={{ fontFamily: fDisp, fontSize: 24, fontWeight: 800, color: PHASE_COLOR[w.phase] }}>{w.totalMiles}</div><div style={{ fontSize: 10, color: DIM, textTransform: "uppercase", letterSpacing: 1 }}>Miles</div></div>
                <div><div style={{ fontFamily: fDisp, fontSize: 24, fontWeight: 800, color: "#a98cf0" }}>{w.longRun}</div><div style={{ fontSize: 10, color: DIM, textTransform: "uppercase", letterSpacing: 1 }}>{w.raceweek?"Race":"Long"}</div></div>
                <Ring p={weekDone(w)} size={34} sw={4} />
              </div>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
              {DAY_KEYS.map((key, i) => {
                const day = w.days[key], isDone = !!done[`W${w.week}-${key}`], hasMini = key==="mon" && w.mini, isRest = day.t==="rest";
                return (
                  <div key={key} style={{ background: SURFACE, border: `1px solid ${isDone?ACCENT+"55":TYPE_COLOR[day.t]+"30"}`, borderLeft: `3px solid ${isDone?ACCENT:TYPE_COLOR[day.t]}`, borderRadius: 11, padding: "13px 14px", display: "flex", gap: 12, alignItems: "flex-start", opacity: isRest?0.5:1 }}>
                    {!isRest
                      ? <button onClick={() => toggleDay(w.week, key)} style={{ marginTop: 1, width: 22, height: 22, borderRadius: 6, flexShrink: 0, cursor: "pointer", background: isDone?ACCENT:"transparent", border: `1.5px solid ${isDone?ACCENT:DIM}`, color: BG, fontSize: 13, lineHeight: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>{isDone?"✓":""}</button>
                      : <div style={{ width: 22, flexShrink: 0 }} />}
                    <div style={{ minWidth: 32, fontFamily: fMono, fontSize: 10, color: DIM, paddingTop: 3 }}>{DAYS[i]}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 7, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 14, fontWeight: 700, color: day.t==="race"?"#ff6b5e":isRest?MUTED:TXT, textDecoration: isDone?"line-through":"none", textDecorationColor: ACCENT }}>{day.l}</span>
                        {!isRest&&<span style={{ fontFamily: fMono, fontSize: 9, letterSpacing: .5, color: TYPE_COLOR[day.t], background: TYPE_COLOR[day.t]+"1e", padding: "2px 7px", borderRadius: 4 }}>{TYPE_LABEL[day.t]}</span>}
                        {day.mi>0&&<span style={{ fontFamily: fMono, fontSize: 10, color: DIM }}>{day.mi}mi</span>}
                      </div>
                      {day.n&&<div style={{ fontSize: 12, color: MUTED, marginTop: 5, lineHeight: 1.55 }}>{inject(day.n)}</div>}
                      {day.t==="long"&&<div style={{ fontSize: 12, color: "#a98cf0", marginTop: 5, lineHeight: 1.55 }}>{inject(w.longRunNote)} <span style={{ color: DIM }}>· {T.long}/mi</span></div>}
                      {day.t==="strength"&&day.r&&<button onClick={() => { setStrengthModal(day.r); setStrengthTab("core"); }} style={{ marginTop: 8, background: "#6bd49a1e", border: `1px solid #6bd49a40`, color: "#6bd49a", borderRadius: 7, padding: "5px 12px", fontFamily: fBody, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>View Routine {day.r} →</button>}
                      {hasMini&&<button onClick={() => setMiniModal(true)} style={{ marginTop: 8, background: "#ff6b5e1e", border: `1px solid #ff6b5e40`, color: "#ff6b5e", borderRadius: 7, padding: "5px 12px", fontFamily: fBody, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>+ Mini Session →</button>}
                    </div>
                  </div>
                );
              })}
            </div>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <button onClick={() => setSelWeek(Math.max(0, selWeek-1))} disabled={selWeek===0} style={{ background: SURFACE, border: `1px solid ${LINE}`, color: selWeek===0?DIM:MUTED, borderRadius: 8, padding: "8px 16px", fontFamily: fBody, fontSize: 12, cursor: selWeek===0?"default":"pointer" }}>← Prev</button>
              <span style={{ fontFamily: fMono, fontSize: 11, color: DIM }}>{selWeek+1} / {weeks.length}</span>
              <button onClick={() => setSelWeek(Math.min(weeks.length-1, selWeek+1))} disabled={selWeek===weeks.length-1} style={{ background: SURFACE, border: `1px solid ${LINE}`, color: selWeek===weeks.length-1?DIM:MUTED, borderRadius: 8, padding: "8px 16px", fontFamily: fBody, fontSize: 12, cursor: "pointer" }}>Next →</button>
            </div>
          </div>
        )}

        {/* STRENGTH */}
        {view === "strength" && (
          <div className="rise" style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div style={{ fontSize: 13, color: MUTED, lineHeight: 1.7 }}>Three rotating routines on Fridays (A→B→C), now paired with an easy shakeout run. Each has a <b style={{ color: "#6bd49a" }}>Core 4</b> (always) plus optional work if you have 10–15 extra minutes.</div>
            {Object.entries(strengthExercises).map(([key, routine]) => (
              <div key={key} style={{ background: SURFACE, border: `1px solid ${LINE}`, borderTop: `3px solid #6bd49a`, borderRadius: 14, overflow: "hidden" }}>
                <div style={{ padding: "14px 18px", borderBottom: `1px solid ${LINE}`, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                  <div>
                    <div style={{ fontFamily: fMono, fontSize: 10, letterSpacing: 1.5, color: "#6bd49a" }}>ROUTINE {key} — {routine.label.toUpperCase()}</div>
                    <div style={{ fontSize: 12, color: MUTED, marginTop: 2 }}>{routine.focus}</div>
                  </div>
                  <span style={{ fontFamily: fMono, fontSize: 10, color: DIM }}>15–20 min</span>
                </div>
                {routine.core.map((ex, i) => (
                  <div key={i} style={{ padding: "11px 18px", borderBottom: `1px solid ${LINE}`, display: "flex", gap: 12 }}>
                    <div style={{ minWidth: 18, fontFamily: fMono, fontSize: 11, color: DIM, paddingTop: 1 }}>{i+1}</div>
                    <div>
                      <div style={{ display: "flex", alignItems: "center", gap: 9, flexWrap: "wrap", marginBottom: 3 }}>
                        <span style={{ fontSize: 13, fontWeight: 700, color: ex.tendon?"#ff6b5e":TXT }}>{ex.name}</span>
                        <span style={{ fontFamily: fMono, fontSize: 10, color: "#6bd49a", background: "#6bd49a1a", padding: "2px 8px", borderRadius: 4 }}>{ex.sets}</span>
                        {ex.tendon&&<span style={{ fontFamily: fMono, fontSize: 9, color: "#ff6b5e", background: "#ff6b5e1a", padding: "2px 6px", borderRadius: 4 }}>NON-NEGOTIABLE</span>}
                      </div>
                      <div style={{ fontSize: 12, color: MUTED, lineHeight: 1.5 }}>{ex.cue}</div>
                    </div>
                  </div>
                ))}
                <div style={{ padding: "8px 18px 4px", fontFamily: fMono, fontSize: 9, letterSpacing: 1.5, color: DIM }}>OPTIONAL — IF TIME</div>
                {routine.optional.map((ex, i) => (
                  <div key={i} style={{ padding: "9px 18px", display: "flex", gap: 12, opacity: .8 }}>
                    <div style={{ minWidth: 18, fontFamily: fMono, fontSize: 11, color: DIM }}>{i+1}</div>
                    <div>
                      <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 3 }}>
                        <span style={{ fontSize: 13, fontWeight: 600, color: "#aeb4bd" }}>{ex.name}</span>
                        <span style={{ fontFamily: fMono, fontSize: 10, color: DIM, background: "#ffffff08", padding: "2px 8px", borderRadius: 4 }}>{ex.sets}</span>
                      </div>
                      <div style={{ fontSize: 12, color: DIM, lineHeight: 1.5 }}>{ex.cue}</div>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* NOTES */}
        {view === "notes" && (
          <div className="rise" style={{ display: "flex", flexDirection: "column", gap: 11 }}>
            {[
              { c: ACCENT,    t: "What changed in v5",              b: "New weekly rhythm: two rest days on Wednesday and Sunday. Quality moves to Tuesday, the long run stays Saturday, and Friday now pairs an easy shakeout with strength. Your two hard days (Tue quality, Sat long) are well separated, and Sunday rest follows the long run — ideal for the tendon. Volume is preserved (~41mi peak) by spreading easy miles across Mon/Thu/Fri." },
              { c: "#5ec5d6", t: "Why this works",                  b: "The Wed rest splits the week so you're never stacking hard days. Sat long → Sun rest gives the tendon a full day to recover from the week's biggest load. You kept all the quality — same MP runs, same speed sessions, same long runs — just repackaged around your two days off." },
              { c: "#a98cf0", t: "Race-day alignment (bonus fix)",  b: "The Hamptons Marathon is a Saturday (Sep 26) — so your Saturday long runs are now literal race-day rehearsals: same day of week, same morning routine. The Bronx 10 (Sun, Sep 13) keeps its real Sunday, with Friday rest and a Saturday shakeout leading in." },
              { c: "#ff6b5e", t: "The honest pace conversation",    b: "Your Brooklyn Half (11:11/mi at HR168) projects a ~5:04 marathon. The 10:50 Stretch tier is faster than your current half pace — possible with a great build, but don't bank on it. Train MP runs at Goal (11:15); let the W8 review tell you if Stretch is real." },
              { c: "#5ec5d6", t: "Easy runs (your zones)",          b: "11:30–12:15/mi at HR 140–155 (corrected for LT 177 / Max 202). Pick the band and hold it. Strides at the end are the only fast running on easy days. Go by HR, not GPS pace, especially in summer heat." },
              { c: "#ff6b5e", t: "Speed progression",               b: `400m (${SPEED_PACES["400m"]}) → 800m (${SPEED_PACES["800m"]}) → 1mi (${SPEED_PACES["1mi"]}) across the plan. Always 1mi warmup + cooldown. Full recovery between reps.` },
              { c: "#a98cf0", t: "Long-run rules",                  b: `Run at ${T.long}/mi (60–90s slower than ${T.name} marathon pace). Fuel from mile 8, then every 40min. Walk water stops from W7. The 18-miler + a sharp taper is plenty for a first marathon.` },
              { c: "#6bd49a", t: "Mini session (now Mondays)",      b: "The mini (glute bridge, calf raise, tibialis) moved to Monday's easy run since Tuesday is now quality. Builds muscular endurance to fight the mile-12 form breakdown. Active W5–14." },
              { c: "#e8a13c", t: "W8 pace review",                  b: "After the W8 15-miler, recheck your predicted marathon time. If easy pace at a given HR has dropped and MP runs feel controlled, graduate from Goal toward Stretch." },
              { c: "#ff6b5e", t: "Race day — Sat Sep 26",           b: "Start at your chosen tier's pace, no faster. Cap HR on the hills. Miles 1–8 disciplined, 9–18 hold form, 19–26.2 is where the work pays off. Don't chase the crowd off the line." },
            ].map((note, i) => (
              <div key={i} style={{ background: SURFACE, border: `1px solid ${LINE}`, borderLeft: `3px solid ${note.c}`, borderRadius: 11, padding: "14px 16px" }}>
                <div style={{ fontFamily: fMono, fontSize: 10, fontWeight: 700, letterSpacing: 1, color: note.c, textTransform: "uppercase", marginBottom: 6 }}>{note.t}</div>
                <div style={{ fontSize: 13, color: MUTED, lineHeight: 1.65 }}>{note.b}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* STRENGTH MODAL */}
      {strengthModal && (
        <div onClick={() => setStrengthModal(null)} style={{ position: "fixed", inset: 0, background: "#000000d0", display: "flex", alignItems: "center", justifyContent: "center", padding: 16, zIndex: 100 }}>
          <div onClick={e => e.stopPropagation()} style={{ background: SURFACE, border: `1px solid #6bd49a40`, borderRadius: 16, padding: 20, maxWidth: 500, width: "100%", maxHeight: "82vh", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <div>
                <div style={{ fontFamily: fMono, fontSize: 10, letterSpacing: 1.5, color: "#6bd49a" }}>ROUTINE {strengthModal}</div>
                <div style={{ fontFamily: fDisp, fontSize: 20, fontWeight: 800 }}>{strengthExercises[strengthModal].label}</div>
              </div>
              <button onClick={() => setStrengthModal(null)} style={{ background: "#ffffff0a", border: `1px solid ${LINE}`, color: MUTED, borderRadius: 8, padding: "7px 12px", cursor: "pointer", fontFamily: fBody, fontSize: 12 }}>Close</button>
            </div>
            <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
              {[["core","Core 4"],["optional","Optional"]].map(([id, l]) => (
                <button key={id} onClick={() => setStrengthTab(id)} style={{ flex: 1, background: strengthTab===id?"#6bd49a1f":"transparent", border: `1px solid ${strengthTab===id?"#6bd49a":LINE}`, color: strengthTab===id?"#6bd49a":MUTED, borderRadius: 8, padding: 8, cursor: "pointer", fontFamily: fBody, fontSize: 12, fontWeight: 600 }}>{l}</button>
              ))}
            </div>
            {(strengthTab==="core" ? strengthExercises[strengthModal].core : strengthExercises[strengthModal].optional).map((ex, i, arr) => (
              <div key={i} style={{ borderBottom: i<arr.length-1?`1px solid ${LINE}`:"none", paddingBottom: 12, marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", gap: 8, marginBottom: 4 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: ex.tendon?"#ff6b5e":strengthTab==="core"?TXT:"#aeb4bd" }}>{i+1}. {ex.name}</span>
                  <span style={{ fontFamily: fMono, fontSize: 10, color: strengthTab==="core"?"#6bd49a":DIM, whiteSpace: "nowrap" }}>{ex.sets}</span>
                </div>
                <div style={{ fontSize: 12, color: MUTED, lineHeight: 1.55 }}>{ex.cue}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* MINI MODAL */}
      {miniModal && (
        <div onClick={() => setMiniModal(false)} style={{ position: "fixed", inset: 0, background: "#000000d0", display: "flex", alignItems: "center", justifyContent: "center", padding: 16, zIndex: 100 }}>
          <div onClick={e => e.stopPropagation()} style={{ background: SURFACE, border: `1px solid #ff6b5e40`, borderRadius: 16, padding: 20, maxWidth: 460, width: "100%" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <div>
                <div style={{ fontFamily: fMono, fontSize: 10, letterSpacing: 1.5, color: "#ff6b5e" }}>MINI SESSION · ~10 MIN</div>
                <div style={{ fontFamily: fDisp, fontSize: 20, fontWeight: 800 }}>Muscular Endurance</div>
                <div style={{ fontSize: 11, color: MUTED, marginTop: 2 }}>After Monday's easy run + strides · in order</div>
              </div>
              <button onClick={() => setMiniModal(false)} style={{ background: "#ffffff0a", border: `1px solid ${LINE}`, color: MUTED, borderRadius: 8, padding: "7px 12px", cursor: "pointer", fontFamily: fBody, fontSize: 12 }}>Close</button>
            </div>
            {tuesdayMini.map((ex, i) => (
              <div key={i} style={{ borderBottom: i<tuesdayMini.length-1?`1px solid ${LINE}`:"none", paddingBottom: 12, marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", gap: 8, marginBottom: 4 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: ex.tendon?"#ff6b5e":TXT }}>{i+1}. {ex.name}</span>
                  <span style={{ fontFamily: fMono, fontSize: 10, color: "#ff6b5e", whiteSpace: "nowrap" }}>{ex.sets}</span>
                </div>
                <div style={{ fontSize: 12, color: MUTED, lineHeight: 1.55 }}>{ex.cue}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ textAlign: "center", fontFamily: fMono, fontSize: 9, letterSpacing: 1.5, color: DIM, paddingBottom: 24 }}>
        HAMPTONS MARATHON · SAT SEP 26 2026 · v5 · LT 177 / MAX 202 · {tier.toUpperCase()} TIER
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
