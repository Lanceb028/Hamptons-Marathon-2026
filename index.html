  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

  .header-dates{font-size:11px;color:#475569;letter-spacing:2px;font-family:'Courier New',monospace}
  .stat-grid{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .stat-card{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:9px 12px;min-width:68px}
  .stat-val{font-size:13px;font-weight:900;font-family:'Courier New',monospace}
  .stat-label{font-size:8px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:2px;font-family:'Courier New',monospace}

  .info-green{background:#052e16;border:1px solid #166534;color:#bbf7d0}
  .info-green strong{color:#4ade80}
  .info-red{background:#450a0a;border:1px solid #991b1b;color:#fecaca}
  .info-red strong{color:#f87171}

  .tabs{position:sticky;top:0;z-index:10;background:#fff;border-bottom:2px solid #e2e8f0;box-shadow:0 1px 4px rgba(0,0,0,.08);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch}

  .week-dot{position:absolute;width:6px;height:6px;border-radius:50%;border:1.5px solid white}

  .item-num{min-width:20px;font-size:11px;color:#cbd5e1;padding-top:1px;font-family:'Courier New',monospace;font-weight:700}

  .alert-title{font-size:9px;text-transform:uppercase;letter-spacing:2px;font-family:'Courier New',monospace;font-weight:700;margin-bottom:5px}
  .alert-body{font-size:12px;line-height:1.7}

  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}

  .note-card{border-radius:8px;padding:13px 14px;margin-bottom:10px;border:1px solid transparent;border-left-width:4px;border-left-style:solid}
  .note-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;font-family:'Courier New',monospace;margin-bottom:5px}

  /* Install banner */
  .install-banner{background:#1e293b;color:#f8fafc;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:12px;font-family:'Courier New',monospace}
  .install-btn{background:#3b82f6;color:#fff;border-radius:6px;padding:7px 14px;font-size:11px;font-family:'Courier New',monospace;font-weight:700;white-space:nowrap}
  .hidden{display:none}
  /* Completed overlay on day */
  .day-done{position:relative}
  .day-done::after{content:'✓';position:absolute;top:10px;right:12px;font-size:16px;color:#059669;font-weight:900}

  .log-textarea{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:13px;font-family:Georgia,serif;resize:none;color:#0f172a;background:#f8fafc;min-height:80px;margin-top:8px}
  .log-textarea:focus{outline:none;border-color:#2563eb}
  .log-save-btn{width:100%;margin-top:10px;background:#0f172a;color:#fff;border-radius:8px;padding:11px;font-size:12px;font-family:'Courier New',monospace;font-weight:700;letter-spacing:1px}
  .progress-bar-wrap{background:#e2e8f0;border-radius:4px;height:6px;margin-top:8px;overflow:hidden}
  .progress-bar-fill{height:100%;border-radius:4px;background:#059669;transition:width .4s}
</style>
</head>

  {week:16,startDate:"Sep 21",phase:"Taper",totalMiles:20,longRun:0,speedSession:false,strengthSets:"none",tueMini:false,longRunNote:"Race week. Everything easy. Trust every mile since June 8.",mon:{type:"rest",label:"Rest"},tue:{type:"easy",label:"3mi Easy + 4 Strides",note:"Last strides. Light and breezy."},wed:{type:"pace",label:"2mi + 4 Race Strides",note:"2mi easy then 4×20sec at goal pace. Stay calm."},thu:{type:"easy",label:"2mi Very Easy",note:"Shakeout only. Legs, not lungs."},fri:{type:"rest",label:"Rest + Packet Pickup"},sat:{type:"rest",label:"Rest. Carb load. Sleep early."},sun:{type:"race",label:"🏁 RACE DAY",note:"Hamptons Marathon — Sep 26. Start 10:45/mi. Cap HR 158 on hills. Miles 1–8 disciplined. Trust the training."}},
];

const PHASE_COLOR = {Base:"#2563eb",Build:"#059669",Peak:"#ea580c",Taper:"#7c3aed"};
const TYPE_COLOR  = {rest:"#94a3b8",easy:"#2563eb",pace:"#d97706",speed:"#dc2626",long:"#7c3aed",strength:"#059669",cross:"#64748b",race:"#dc2626"};
const TYPE_BG     = {rest:"#f1f5f9",easy:"#eff6ff",pace:"#fffbeb",speed:"#fef2f2",long:"#f5f3ff",strength:"#ecfdf5",cross:"#f8fafc",race:"#fef2f2"};
const DAYS = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
const DAY_KEYS = ["mon","tue","wed","thu","fri","sat","sun"];

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  view: "plan",
  selectedWeek: 0,
  modal: null,       // null | "strength" | "mini" | "log"
  strengthRoutine: null,
  strengthTab: "core",
  logTarget: null,   // {weekIdx, dayKey}
  logText: "",
  completed: {},     // key: "w0-mon" -> {done:true, note:"..."}
};

// Load persisted data
try {
  const saved = localStorage.getItem("hamptons_log");
  if (saved) state.completed = JSON.parse(saved);
} catch(e){}

function saveLog() {
  try { localStorage.setItem("hamptons_log", JSON.stringify(state.completed)); } catch(e){}
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  document.getElementById("app").innerHTML = buildApp();
  attachEvents();
}

function completedKey(wIdx, dayKey) { return `w${wIdx}-${dayKey}`; }
function isDone(wIdx, dayKey) { return !!(state.completed[completedKey(wIdx,dayKey)]||{}).done; }
function getNote(wIdx, dayKey) { return (state.completed[completedKey(wIdx,dayKey)]||{}).note||""; }

function countDone() {
  return Object.values(state.completed).filter(v=>v.done).length;
}
function totalWorkouts() {
  let t=0;
  weeks.forEach(w=>{
    DAY_KEYS.forEach(k=>{ if(w[k] && w[k].type!=="rest") t++; });
  });
  return t;
}

function buildApp() {
  const w = weeks[state.selectedWeek];
  const done = countDone(), total = totalWorkouts();
  const pct = Math.round(done/total*100);

  return `
  <div class="header">
    <div class="header-sub">Higdon N2 Hybrid · LT 177 · Max HR 202</div>
    <h1>Hamptons Marathon</h1>
    <div class="header-dates mono">JUN 8 → SEP 26, 2026 · 16 WEEKS</div>
    <div class="stat-grid">
      ${[["16 Wks","Plan","#3b82f6"],["20 Mi","Peak Long","#8b5cf6"],["Sep 26","Race Day","#ef4444"],["177","LT HR","#dc2626"],["202","Max HR","#dc2626"]].map(([v,l,c])=>`
        <div class="stat-card"><div class="stat-val mono" style="color:${c}">${v}</div><div class="stat-label">${l}</div></div>
      `).join("")}
    </div>
    <div style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span class="mono" style="font-size:10px;color:#64748b;letter-spacing:2px">TRAINING LOG</span>
        <span class="mono" style="font-size:11px;color:#4ade80;font-weight:700">${done}/${total} workouts · ${pct}%</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="info-box info-green" style="margin-top:10px">
      <strong>HR Zones:</strong> Easy 140–162 · MP 155–165 · Speed up to 177
    </div>
    <div class="info-box info-red" style="margin-top:8px">
      <strong>⚡ Tendon:</strong> Eccentric Tibialis Raises every session. Non-negotiable.
    </div>
  </div>

  <div class="tabs">
    ${[["plan","Plan"],["mini","Mini"],["strength","Strength"],["notes","Notes"]].map(([id,label])=>`
      <button class="tab-btn ${state.view===id?"active":""}" data-tab="${id}">${label}</button>
    `).join("")}
  </div>

  <div class="content">
    ${state.view==="plan" ? buildPlanView(w) : ""}
    ${state.view==="mini" ? buildMiniView() : ""}
    ${state.view==="strength" ? buildStrengthView() : ""}
    ${state.view==="notes" ? buildNotesView() : ""}
  </div>

  ${state.modal==="strength" ? buildStrengthModal() : ""}
  ${state.modal==="mini" ? buildMiniModal() : ""}
  ${state.modal==="log" ? buildLogModal() : ""}
  `;
}

function buildPlanView(w) {
  const weekBtns = weeks.map((wk,i)=>{
    const active = state.selectedWeek===i;
    const pc = PHASE_COLOR[wk.phase];
    const doneCount = DAY_KEYS.filter(k=>isDone(i,k)).length;
    const totalDays = DAY_KEYS.filter(k=>wk[k]&&wk[k].type!=="rest").length;
    const allDone = doneCount===totalDays && totalDays>0;
    return `<div style="position:relative">
      <button class="week-btn" data-week="${i}"
        style="background:${active?pc:(allDone?"#ecfdf5":"#fff")};color:${active?"#fff":(allDone?"#059669":wk.bronx10?"#dc2626":pc)};border-color:${active?pc:(allDone?"#059669":wk.bronx10?"#dc2626":wk.speedSession?pc:"#e2e8f0")};${active?`box-shadow:0 2px 8px ${pc}40`:""}"
      >${i+1}${allDone?"✓":""}</button>
      ${wk.speedSession&&!active&&!wk.bronx10?`<div class="week-dot" style="top:2px;right:2px;background:#dc2626"></div>`:""}
      ${wk.tueMini&&!active?`<div class="week-dot" style="bottom:2px;left:2px;background:#059669"></div>`:""}
    </div>`;
  }).join("");

  const pc = w.bronx10?"#dc2626":PHASE_COLOR[w.phase];

  const daycards = DAY_KEYS.map((key,i)=>{
    const day = w[key];
    if(!day) return "";
    const hasMini = key==="tue" && w.tueMini;
    const isRest = day.type==="rest";
    const done = isDone(state.selectedWeek, key);
    const note = getNote(state.selectedWeek, key);
    const tc = TYPE_COLOR[day.type];
    const tbg = TYPE_BG[day.type];
    return `<div class="day-card ${done&&!isRest?"day-done":""}" style="background:${isRest?"#f8fafc":tbg};border-color:${isRest?"#e2e8f0":(tc+"40")};border-left-color:${hasMini?"#d97706":(isRest?"#e2e8f0":tc)};opacity:${isRest?0.55:1}">
      <div class="day-label">${DAYS[i]}</div>
      <div style="flex:1">
        <div class="day-title" style="color:${isRest?"#94a3b8":"#0f172a"}">${day.label}</div>
        <div class="day-tags">
          <span class="day-tag" style="color:${tc};background:${tc}18">${day.type}</span>
          ${hasMini?`<span class="day-tag" style="color:#92400e;background:#fef3c7">+MINI</span>`:""}
          ${key==="sun"&&day.type==="easy"?`<span class="day-tag" style="color:#1e40af;background:#dbeafe">RECOVERY</span>`:""}
          ${done&&!isRest?`<span class="day-tag" style="color:#065f46;background:#d1fae5">✓ DONE</span>`:""}
        </div>
        ${day.note?`<div class="day-note">${day.note}</div>`:""}
        ${day.type==="long"?`<div class="day-long-note" style="color:${w.bronx10?"#991b1b":"#5b21b6"}">${w.longRunNote}</div>`:""}
        ${note?`<div class="day-note" style="color:#059669;margin-top:4px;font-style:italic">📝 ${note}</div>`:""}
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
          ${!isRest?`<button class="action-btn" data-log="${key}" style="color:${done?"#991b1b":"#065f46"};background:${done?"#fef2f2":"#ecfdf5"};border-color:${done?"#dc2626":"#059669"}">${done?"Unmark":"Log Run"}</button>`:""}
          ${day.type==="strength"&&day.routine?`<button class="action-btn" data-strength="${day.routine}" style="color:#065f46;background:#ecfdf5;border-color:#059669">Routine ${day.routine} →</button>`:""}
          ${hasMini?`<button class="action-btn" data-mini="1" style="color:#92400e;background:#fffbeb;border-color:#d97706">Mini Session →</button>`:""}
        </div>
      </div>
    </div>`;
  }).join("");

  return `
    <div class="section-label">SELECT WEEK</div>
    <div class="week-grid">${weekBtns}</div>
    <div class="week-legend">Red dot = speed · Red border = Bronx · Green dot = Tue mini · ✓ = week complete</div>

    <div class="week-header" style="border-top-color:${pc}">
      <div>
        <div class="week-phase" style="color:${pc}">Week ${w.week} · ${w.phase}${w.cutback?" · CUTBACK":""}${w.speedSession&&!w.bronx10?" · SPEED":""}${w.bronx10?" · BRONX 10":""}${w.tueMini?" · TUE MINI":""}</div>
        <div class="week-date">${w.startDate}</div>
      </div>
      <div class="week-stats">
        <div class="week-stat"><div class="week-stat-val" style="color:${PHASE_COLOR[w.phase]}">${w.totalMiles}</div><div class="week-stat-label">Miles</div></div>
        <div class="week-stat"><div class="week-stat-val" style="color:${w.bronx10?"#dc2626":"#7c3aed"}">${w.longRun||"🏁"}</div><div class="week-stat-label">Long</div></div>
        <div class="week-stat"><div class="week-stat-val mono" style="font-size:11px;color:#059669">${w.strengthSets}</div><div class="week-stat-label">Strength</div></div>
      </div>
    </div>

    <div class="day-list">${daycards}</div>

    <div class="week-nav">
      <button class="nav-btn" id="prevBtn" ${state.selectedWeek===0?"disabled":""}>← Prev</button>
      <span class="nav-center">Week ${state.selectedWeek+1} of ${weeks.length}</span>
      <button class="nav-btn" id="nextBtn" ${state.selectedWeek===weeks.length-1?"disabled":""}>Next →</button>
    </div>
  `;
}

  return `
    <div class="section-label">TUESDAY MINI SESSION</div>
    <div class="alert" style="background:#fffbeb;border-color:#d97706;border:1px solid #d97706;border-left-width:4px">

function buildStrengthModal() {
  const r = strengthExercises[state.strengthRoutine];
  if (!r) return "";

}

function buildLogModal() {
  const {weekIdx, dayKey} = state.logTarget;
  const w = weeks[weekIdx];
  const day = w[DAY_KEYS.find(k=>k===dayKey)];
  const done = isDone(weekIdx, dayKey);
  const existingNote = getNote(weekIdx, dayKey);
  return `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <div>
            <div style="font-size:9px;color:#2563eb;text-transform:uppercase;letter-spacing:3px;font-family:monospace;font-weight:700">Log Workout</div>
            <div style="font-size:18px;font-weight:700;color:#0f172a;margin-top:3px">${day?day.label:""}</div>
            <div style="font-size:12px;color:#64748b;margin-top:2px">W${weekIdx+1} · ${w.startDate} · ${dayKey.toUpperCase()}</div>
          </div>
          <button class="modal-close" id="closeModal">✕ CLOSE</button>
        </div>
        <div style="margin-bottom:12px">
          <div style="font-size:11px;color:#64748b;margin-bottom:6px;font-family:monospace">STATUS</div>
          <div style="display:flex;gap:8px">
            <button id="markDone" style="flex:1;padding:10px;border-radius:8px;font-size:12px;font-family:monospace;font-weight:700;border:1.5px solid ${!done?"#059669":"#e2e8f0"};background:${!done?"#ecfdf5":"#f8fafc"};color:${!done?"#065f46":"#94a3b8"}">✓ Completed</button>
            <button id="markSkip" style="flex:1;padding:10px;border-radius:8px;font-size:12px;font-family:monospace;font-weight:700;border:1.5px solid ${done?"#e2e8f0":"#dc2626"};background:${done?"#f8fafc":"#fef2f2"};color:${done?"#94a3b8":"#991b1b"}">✗ Skipped/Undo</button>
          </div>
        </div>
        <div>
          <div style="font-size:11px;color:#64748b;margin-bottom:4px;font-family:monospace">NOTES (optional)</div>
          <textarea class="log-textarea" id="logNoteInput" placeholder="How did it feel? HR, pace, conditions...">${existingNote}</textarea>
        </div>
        <button class="log-save-btn" id="saveLogBtn">Save →</button>

  `;
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
function attachEvents() {
  // Tabs
  document.querySelectorAll("[data-tab]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.view=btn.dataset.tab; render(); });
  });
  // Week buttons
  document.querySelectorAll("[data-week]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.selectedWeek=parseInt(btn.dataset.week); render(); });
  });
  // Prev/next
  const prev=document.getElementById("prevBtn");
  const next=document.getElementById("nextBtn");
  if(prev) prev.addEventListener("click",()=>{ if(state.selectedWeek>0){state.selectedWeek--;render();} });
  if(next) next.addEventListener("click",()=>{ if(state.selectedWeek<weeks.length-1){state.selectedWeek++;render();} });
  // Strength buttons
  document.querySelectorAll("[data-strength]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.modal="strength"; state.strengthRoutine=btn.dataset.strength; state.strengthTab="core"; render(); });
  });
  // Mini buttons
  document.querySelectorAll("[data-mini]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.modal="mini"; render(); });
  });
  // Log buttons
  document.querySelectorAll("[data-log]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const key = btn.dataset.log;
      const wIdx = state.selectedWeek;
      // Quick toggle if no note exists
      const ck = completedKey(wIdx, key);
      if(isDone(wIdx,key) && !getNote(wIdx,key)){
        state.completed[ck] = {done:false, note:""};
        saveLog(); render(); return;
      }
      state.modal="log";
      state.logTarget={weekIdx:wIdx, dayKey:key};
      render();
    });
  });
  // Modal close
  const closeBtn=document.getElementById("closeModal");
  if(closeBtn) closeBtn.addEventListener("click",()=>{ state.modal=null; render(); });
  const overlay=document.getElementById("modalOverlay");
  if(overlay) overlay.addEventListener("click",(e)=>{ if(e.target===overlay){state.modal=null;render();} });
  // Strength tabs in modal
  document.querySelectorAll("[data-stab]").forEach(btn=>{
    btn.addEventListener("click",()=>{ state.strengthTab=btn.dataset.stab; render(); });
  });
  // Log modal buttons
  const markDone=document.getElementById("markDone");
  const markSkip=document.getElementById("markSkip");
  const saveBtn=document.getElementById("saveLogBtn");
  if(markDone) markDone.addEventListener("click",()=>{
    const {weekIdx,dayKey}=state.logTarget;
    const ck=completedKey(weekIdx,dayKey);
    state.completed[ck]={...(state.completed[ck]||{}),done:true};
    render();
  });
  if(markSkip) markSkip.addEventListener("click",()=>{
    const {weekIdx,dayKey}=state.logTarget;
    const ck=completedKey(weekIdx,dayKey);
    state.completed[ck]={...(state.completed[ck]||{}),done:false};
    render();
  });
  if(saveBtn) saveBtn.addEventListener("click",()=>{
    const {weekIdx,dayKey}=state.logTarget;
    const ck=completedKey(weekIdx,dayKey);
    const noteEl=document.getElementById("logNoteInput");
    const note=noteEl?noteEl.value:"";
    state.completed[ck]={...(state.completed[ck]||{}),note};
    saveLog();
    state.modal=null;
    render();
  });
}

// ─── PWA ─────────────────────────────────────────────────────────────────────
let deferredPrompt = null;

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById("installBanner").classList.remove("hidden");
});

window.installPWA = function() {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; document.getElementById("installBanner").classList.add("hidden"); });
};

// Service Worker
if("serviceWorker" in navigator){
  const swCode = `
const CACHE="hamptons-v1";
const ASSETS=[location.href];
self.addEventListener("install",e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener("activate",e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener("fetch",e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    if(res.ok){const c=res.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c));}
    return res;
  }).catch(()=>caches.match(e.request))));
});
  `;
  const blob = new Blob([swCode],{type:"application/javascript"});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
